<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/webfont/1.6.28/webfontloader.js" integrity="sha512-v/wOVTkoU7mXEJC3hXnw9AA6v32qzpknvuUF6J2Lbkasxaxn2nYcl+HGB7fr/kChGfCqubVr1n2sq1UFu3Gh1w==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      font-family: 'Google Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
      color: #333;
      background-color: #f4f4f9;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .page-wrapper {
      width: 100%;
      max-width: 800px;
      min-height: 100%;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
    }

    header {
      border-bottom: 2px solid #007bff;
      margin-bottom: 20px;
      padding-bottom: 10px;
    }

    h1 {
      margin: 0;
      color: #007bff;
    }

    main {
      flex: 1;
    }

    footer {
      font-size: 0.8em;
      color: #777;
      text-align: center;

      padding-top: 16px;
      margin-top: 40px;

<body>
  <div class="page-wrapper">
    <header>
      <h1>acmeintegrated</h1>

      <p>Soon online...</p>
      <span id="email-link">Loading email...</span>
    </main>

    <footer>
      <p>&copy; 2026 acmeintegrated</p>

  </div>

  <script>
    const user = "acmeintegrated";
    const domain = "gmail.com";
    const element = document.getElementById('email-link');
    element.innerHTML = `<a href="mailto:${user}@${domain}">${user}@${domain}</a>`;
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/instant.page/5.2.0/instantpage.min.js" integrity="sha512-p8l0Kir2Q2O+MWF/+qw2yM2LQQf0+m0AMD0EvGTFFL9vHquAXMRQKuyFBvHdTWpGEgIbXZxd9vjCRPUHeAhsOA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
